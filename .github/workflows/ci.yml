name: CI

on:
  push:
    branches:
      - main
      - staging
      - dev
  pull_request:

permissions:
  contents: read

jobs:
  go-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4  # TODO: pin to a specific SHA

      - uses: actions/setup-go@v6  # TODO: pin to a specific SHA
        with:
          go-version-file: go.mod

      - name: Run tests with coverage gate
        run: |
          packages="$(go list ./... | grep -v '^github.com/herooftimeandspace/zoom-sdk-golang/scripts/parity$')"
          go test $packages -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out | tee coverage.txt
          coverage="$(go tool cover -func=coverage.out | awk '/total:/ {print substr($3, 1, length($3)-1)}')"
          awk -v c="$coverage" 'BEGIN { if ((c + 0) < 95) exit 1 }'

      - name: Verify docs render
        run: |
          for pkg in $(go list ./...); do
            go doc "$pkg" >/dev/null
          done

  parity:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4  # TODO: pin to a specific SHA

      - uses: actions/checkout@v4  # TODO: pin to a specific SHA
        with:
          repository: herooftimeandspace/zoom-sdk-python
          ref: dev
          path: zoom-sdk-python

      - uses: actions/setup-go@v6  # TODO: pin to a specific SHA
        with:
          go-version-file: go.mod

      - name: Verify vendored parity assets are in sync
        env:
          ZOOM_SDK_PYTHON_ROOT: ${{ github.workspace }}/zoom-sdk-python
        run: go run ./scripts/parity sync --check

      - name: Run vendored parity checks
        run: go run ./scripts/parity verify

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4  # TODO: pin to a specific SHA

      - uses: actions/setup-go@v6  # TODO: pin to a specific SHA
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        run: go tool govulncheck ./...
