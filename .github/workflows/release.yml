name: release

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Resolve promotion PR and release version
        id: semver
        env:
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          pr_number="$(gh api "repos/${GH_REPO}/commits/${GH_SHA}/pulls" --jq '[.[] | select(.base.ref == "main")][0].number // empty' 2>/dev/null || true)"
          if [ -z "${pr_number}" ]; then
            echo "No main pull request is associated with ${GH_SHA}; this is not a release promotion."
            echo "release=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          head_ref="$(gh pr view "${pr_number}" --repo "${GH_REPO}" --json headRefName --jq '.headRefName')"
          if [ "${head_ref}" != "promote/staging-to-main" ]; then
            echo "PR #${pr_number} came from ${head_ref}; only staging promotion PRs create releases."
            echo "release=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          labels="$(gh pr view "${pr_number}" --repo "${GH_REPO}" --json labels --jq '.labels[].name')"
          semver_labels="$(printf '%s\n' "${labels}" | grep '^semver:' || true)"
          semver_count="$(printf '%s\n' "${semver_labels}" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [ "${semver_count}" != "1" ]; then
            echo "Expected exactly one semver label on PR #${pr_number}; found ${semver_count}."
            exit 1
          fi

          part="${semver_labels#semver:}"
          previous_tag="$(git describe --tags --match 'v[0-9]*.[0-9]*.[0-9]*' --abbrev=0 HEAD^ 2>/dev/null || true)"
          previous_version="${previous_tag#v}"
          if [ -z "${previous_version}" ]; then previous_version="0.0.0"; fi
          release_version="$(go run scripts/release_tools.go bump --part "${part}" --current-version "${previous_version}")"

          echo "release=true" >> "${GITHUB_OUTPUT}"
          echo "version=${release_version}" >> "${GITHUB_OUTPUT}"

      - name: Stop if release already exists
        if: steps.semver.outputs.release == 'true'
        id: existing_release
        env:
          RELEASE_VERSION: ${{ steps.semver.outputs.version }}
        run: |
          if gh release view "v${RELEASE_VERSION}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release v${RELEASE_VERSION} already exists; skipping."
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "exists=false" >> "${GITHUB_OUTPUT}"

      - name: Build and test release
        if: steps.semver.outputs.release == 'true' && steps.existing_release.outputs.exists != 'true'
        env:
          RELEASE_VERSION: ${{ steps.semver.outputs.version }}
        run: |
          mkdir -p dist
          go test ./...
          git archive --format=zip --output "dist/zoom-sdk-golang-${RELEASE_VERSION}.zip" HEAD

      - name: Create GitHub Release
        if: steps.semver.outputs.release == 'true' && steps.existing_release.outputs.exists != 'true'
        env:
          RELEASE_VERSION: ${{ steps.semver.outputs.version }}
        run: |
          gh release create "v${RELEASE_VERSION}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "v${RELEASE_VERSION}" \
            --generate-notes \
            --target "$(git rev-parse HEAD)"
